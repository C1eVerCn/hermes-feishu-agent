# docker-compose.bot.yml — bot 单独 compose，依赖 fmp 栈
# 用法：
#   docker compose -f docker-compose.bot.yml up -d --build
#   docker compose -f docker-compose.bot.yml logs -f
#   docker compose -f docker-compose.bot.yml down
#
# 前置：fmp 栈在跑（/Users/chris/IM/dmz-fmp/docker/docker-compose.yml up -d）
#       会创建 docker_fmp-net 网络；本 compose 把 bot 接入同网络。
#
# 端口：
#   - 8088 host 端暴露（/health 检查用）
#   - bot 容器内调 fmp 通过 fmp-app:9013（fmp-app 是 fmp 栈的容器名）

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: dmz-bot:dev
    container_name: dmz-bot
    restart: unless-stopped
    env_file: .env
    environment:
      # 覆盖 .env 里的 127.0.0.1:9013 → 容器内用 docker 服务名
      # 注：bot 代码读 BENCH_API_BASE_URL（不是 MOCK_API_BASE_URL），看
      # config/settings.py:34 和 bench_tools/handlers.py:20
      BENCH_API_BASE_URL: http://fmp-app:9013
    volumes:
      # 整个项目源码挂载——避免每次改代码都要重建 image（容器内 ocl/ bot/ feishu/
      # bench_tools/ 等用 pip install -e . 装为 editable，host 改动 import 时即生效）
      - ./:/app
      # data/ 已被上面覆盖挂载（./:/app 把 data 也带进去了；显式声明强调意图）
      # 身份表挂载
      - ./data:/app/data
    # 公网 DNS 配在 docker DNS 之前（docker DNS 只能解析 fmp-net 内的服务名，
    # 公网域名如 open.feishu.cn 必须走公网 DNS；之前不配时 urllib3 偶尔
    # NameResolutionError 卡 30s+ 拖慢整条消息处理）
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 127.0.0.11
    networks:
      - fmp-net
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8088/health', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  # 接入已有的 fmp-net（不是新建网络）。Docker compose 语法：用 external
  # 指向已存在的 network，prefix 是项目目录名（dmz-fmp → docker_fmp-net）
  fmp-net:
    external: true
    name: docker_fmp-net
